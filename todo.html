<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Todo list</title>
</head>
<body>
    <div class="container text-center">
    <h1>To Do list</h1>
    <input placeholder="Add Todo" id="Task" class="form-control">
    <button class="btn btn-primary mt-2" onclick="add_todo()">Add to do</button>
    <div class="list-group" id="result"></div>
    <br>
    <button class="btn btn-danger mt-2" onclick="clear_todo()">Clear</button>
    </div>
    <script src="todo.js"></script>
</body>
</html>
